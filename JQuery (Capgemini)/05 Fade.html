<!Doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Fade - jQuery</title>
        
        <!--jQuery-->
        <script src="jquery-3.6.0.min.js"></script>
        
        <!--Script-->
        <script>
            
            //Ao carregar o documento
            $(document).ready(function(){
                
                //Ocultar o H1
                $("h1").css("display","none");
                
                //Exibit o H1
                $("#exibir").click(function(){
                    $("h1").fadeIn();
                });
                
                //Ocultar o H1
                $("#ocultar").click(function(){
                    $("h1").fadeOut();                                   
                });
                
                /*
                Tempo
                1º Default 0,4s
                2º Slow 0,6s
                3º Valor 3000 = 3s
                */
                
            });
            
        </script>
    </head>
    <body>
        <button id="exibir">Exibir</button>
        <button id="ocultar">Ocultar</button>
        <h1>Aprendendo jQuery</h1>
    </body>
</html>
