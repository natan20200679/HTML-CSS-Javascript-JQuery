<!Doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Estrutura Base - jQuery</title>
        
        <!--jQuery-->
        <script src="jquery-3.6.0.min.js"></script>
        
        <!--Script-->
        <script>
            
            //Ao carregar o documento
            $(document).ready(function(){
                
                //Selecionar e alterar o elemento img
                $("img").attr("width","700");
                $("img").attr("title","alterando title via jQuery");
            });
            
        </script>
        
    </head>
    <body>
        <img src="logo-proway-azul.jpg" width="100">
    </body>
</html>
