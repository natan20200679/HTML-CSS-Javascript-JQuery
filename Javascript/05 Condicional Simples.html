<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Condicional Simples</title>
        
        <!---JS--->
        <script>
            
            //Variável
            var idade = 17;
            
            //Condicional
            if(idade >= 18)
                window.alert("Aprovado!");
            else
                window.alert("Reprovado! " + idade);
            
            
        </script>
        
    </head> 
    <body></body>
</html>
