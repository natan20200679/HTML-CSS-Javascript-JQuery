<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Condicional Aninhada</title>
        
        <!---JS--->
        <script>
            
            //Média
            var media = 8.5;
            
            //Condicional
            if(media == 10)
                window.alert("Parabéns!");
            else if(media >= 9)
                window.alert("òtimo!");
            else if(media >= 8)
                window.alert("Bom!");
            else if(media >= 7)
                window.alert("Na Média!");
            else if(media >= 5)
                window.alert("Em Exame!");
            else
                window.alert("Reprovado!");
            
        </script>
        
    </head> 
    <body></body>
</html>
