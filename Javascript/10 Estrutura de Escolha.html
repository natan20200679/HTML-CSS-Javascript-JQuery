<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Estrutura de Escolha</title>
        
        <!---JS--->
        <script>
            
            //Variáveis
            var codigo = 1;
            
            //Estrutura de Escolha
            switch(codigo){
                    
                case 1:
                alert("Pizza");
                break;
                
                case 2:
                alert("Suco");
                break;
                
                case 3:
                alert("Macarrão");
                break;
                
                default:
                alert("Código Inválido");
                break;
                          
            }
                     
        </script>
        
    </head> 
    <body></body>
</html>
