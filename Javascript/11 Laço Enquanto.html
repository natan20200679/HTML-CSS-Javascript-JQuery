<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Laço Enquanto</title>
        
        <!---JS--->
        <script>
            
            //Variáveis
            var indice = 1;
            
            //Laço de Repetição
            while(indice <=3){
                alert("Oi " + indice)
                indice++;
            }
                      
        </script>
