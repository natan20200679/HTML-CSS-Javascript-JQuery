<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Extrair Elementos</title>
        
        <!---JS--->
        <script>
        
            //Variável
            var termo = "Aprendendo Javascript";
            
            //Extrair (de onde começa)
            alert(termo.slice(10));
            
            //Extrair (de onde começa e termina)
            alert(termo.slice(10,15));
            
        </script>
    </head> 
    <body></body>
</html>
