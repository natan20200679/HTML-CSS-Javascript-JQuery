<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Evento de Teclado</title>
        
        <!---JS--->
        <script>
        
            /*
            onKeyUp: Exibe o caractere e depois executa a ação
            onKeyDown: Exibe a ação de depois exibe o caractere
            onKeyPress: Exibe a ação de depois exibe o caractere. Não tem suporte às seguintes teclas: F1...F12,ALT,CTRL,SHIFT,...
            */
            
            function exibir(){
                //Obter o valor do campo texto
                var campo = document.getElementById("campo").value;
                //Exibir o conteúdo digitado no campo
                alert(campo);
            }
            function exibir1(){
                var campo1 = document.getElementById("campo1").value;
                alert(campo1);
            }
            function exibir2(){
                var campo2 = document.getElementById("campo2").value;
                alert(campo2);
            }
            
        </script>
    </head> 
    <body>
        <input type="text" id="campo" onkeyup="exibir()">
        <input type="text" id="campo1" onKeyDown="exibir1()">
        <input type="text" id="campo2" onkeypress="exibir2()">
    </body>
</html>
